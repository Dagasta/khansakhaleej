<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خنساء Editorial Intelligence — Intelligent Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
/* === TOKENS & RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#090e1a;--bg-surface:#0f1728;--bg-card:#131d30;--bg-card-hover:#182238;
  --bg-glass:rgba(19,29,48,0.85);--border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.12);
  --accent-blue:#1a6cf6;--accent-teal:#0abfbc;--accent-gold:#f59e0b;--accent-red:#ef4444;--accent-green:#22c55e;
  --text-primary:#f0f4ff;--text-secondary:#8a99b8;--text-muted:#4a5568;
  --cat-uae:#1a6cf6;--cat-economy:#22c55e;--cat-politics:#a855f7;--cat-rankings:#f59e0b;
  --radius-sm:6px;--radius-md:12px;--radius-lg:18px;
  --shadow-card:0 4px 24px rgba(0,0,0,0.4);--shadow-glow:0 0 30px rgba(26,108,246,0.15);
  --font-body:'Inter',system-ui,sans-serif;--font-display:'Playfair Display',Georgia,serif;
  --transition:0.22s cubic-bezier(0.4,0,0.2,1)
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:var(--bg-glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1600px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{flex-shrink:0;filter:drop-shadow(0 0 8px rgba(26,108,246,0.4))}
.brand-name{display:block;font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text-primary);line-height:1.1;letter-spacing:-0.3px}
.brand-tagline{display:block;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent-teal)}
.header-right{display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--accent-red)}
.live-dot{width:7px;height:7px;background:var(--accent-red);border-radius:50%;animation:pulse-dot 1.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}
.last-updated{font-size:12px;color:var(--text-secondary)}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(26,108,246,0.1);border:1px solid rgba(26,108,246,0.3);border-radius:var(--radius-sm);color:var(--accent-blue);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:var(--font-body)}
.refresh-btn:hover{background:rgba(26,108,246,0.2);border-color:rgba(26,108,246,0.6);transform:translateY(-1px)}
.refresh-btn svg{transition:transform 0.5s ease}
.refresh-btn:hover svg{transform:rotate(180deg)}

/* === TICKER === */
.ticker-wrapper{display:flex;align-items:center;height:36px;background:linear-gradient(90deg,#1a0a02,#0a0d1a);border-bottom:1px solid rgba(245,158,11,0.2);overflow:hidden}
.ticker-label{flex-shrink:0;padding:0 16px;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--accent-gold);background:rgba(245,158,11,0.15);border-right:1px solid rgba(245,158,11,0.3);height:100%;display:flex;align-items:center}
.ticker-track{flex:1;overflow:hidden}
.ticker-inner{display:inline-block;white-space:nowrap;font-size:12px;color:var(--text-secondary);animation:ticker-scroll 80s linear infinite;padding-left:100%}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* === STATS BAR === */
.stats-bar{max-width:1600px;margin:0 auto;padding:14px 24px;display:flex;align-items:center}
.stat-item{display:flex;flex-direction:column;align-items:flex-start;padding:0 28px}
.stat-item:first-child{padding-left:0}
.stat-num{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.5px}
.stat-divider{width:1px;height:32px;background:var(--border)}

/* === LAYOUT === */
.main{max-width:1600px;margin:0 auto;padding:0 24px 48px;display:grid;grid-template-columns:220px 1fr 280px;gap:24px;align-items:start}

/* === SIDEBAR === */
.sidebar{position:sticky;top:108px;display:flex;flex-direction:column;gap:8px}
.sidebar-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px}
.sidebar-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.filter-list{display:flex;flex-direction:column;gap:4px}
.filter-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);text-align:left;font-family:var(--font-body);width:100%}
.filter-btn:hover{background:rgba(255,255,255,0.04);color:var(--text-primary)}
.filter-btn.active{background:rgba(26,108,246,0.12);border-color:rgba(26,108,246,0.3);color:#7eb8ff}
.filter-btn[data-filter="economy"].active{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:#86efac}
.filter-btn[data-filter="politics"].active{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.25);color:#d8b4fe}
.filter-btn[data-filter="rankings"].active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:#fcd34d}
.filter-icon{font-size:15px}
.filter-count{margin-left:auto;font-size:11px;font-weight:700;background:rgba(255,255,255,0.07);padding:1px 7px;border-radius:99px;color:var(--text-muted)}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.priority-dot.high{background:var(--accent-red);box-shadow:0 0 6px var(--accent-red)}
.priority-dot.medium{background:var(--accent-gold)}
.priority-dot.low{background:var(--text-muted)}
.source-list{display:flex;flex-direction:column;gap:6px}
.source-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);padding:4px 0}
.source-status{width:7px;height:7px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green)}
.source-status.error{background:var(--accent-red);box-shadow:none}
.search-box{position:relative}
.search-input{width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px 9px 36px;color:var(--text-primary);font-size:13px;font-family:var(--font-body);transition:var(--transition);outline:none}
.search-input:focus{border-color:rgba(26,108,246,0.5);background:var(--bg-card);box-shadow:0 0 0 3px rgba(26,108,246,0.1)}
.search-input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

/* === CONTENT AREA === */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-primary)}
.view-controls{display:flex;gap:4px}
.view-btn{padding:7px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;transition:var(--transition);display:flex;align-items:center}
.view-btn.active,.view-btn:hover{color:var(--accent-blue);border-color:rgba(26,108,246,0.3);background:rgba(26,108,246,0.08)}
.loading-state{text-align:center;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;font-weight:600;color:var(--text-primary)}
.loading-sub{font-size:13px;color:var(--text-muted)}
.error-state{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.error-icon{font-size:40px}
.error-state h3{font-size:18px;font-weight:600}
.error-state p{font-size:14px;color:var(--text-secondary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:14px}

/* === NEWS CARDS === */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.news-grid.list-view{grid-template-columns:1fr}
.news-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:var(--transition);display:flex;flex-direction:column;position:relative;animation:card-in 0.35s ease both}
@keyframes card-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.news-card:hover{transform:translateY(-3px);border-color:var(--border-light);box-shadow:var(--shadow-card),var(--shadow-glow);background:var(--bg-card-hover)}
.card-accent{height:3px;flex-shrink:0}
.card-accent.uae{background:linear-gradient(90deg,var(--cat-uae),#5b9bf8)}
.card-accent.economy{background:linear-gradient(90deg,var(--cat-economy),#86efac)}
.card-accent.politics{background:linear-gradient(90deg,var(--cat-politics),#c084fc)}
.card-accent.rankings{background:linear-gradient(90deg,var(--cat-rankings),#fde047)}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.card-cat.uae{background:rgba(26,108,246,0.15);color:#7eb8ff}
.card-cat.economy{background:rgba(34,197,94,0.15);color:#86efac}
.card-cat.politics{background:rgba(168,85,247,0.15);color:#d8b4fe}
.card-cat.rankings{background:rgba(245,158,11,0.15);color:#fcd34d}
.card-priority{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700}
.card-priority .dot{width:6px;height:6px;border-radius:50%}
.card-priority.high{color:var(--accent-red)}.card-priority.high .dot{background:var(--accent-red);box-shadow:0 0 5px var(--accent-red)}
.card-priority.medium{color:var(--accent-gold)}.card-priority.medium .dot{background:var(--accent-gold)}
.card-priority.low{color:var(--text-muted)}.card-priority.low .dot{background:var(--text-muted)}
.card-title{font-size:15px;font-weight:700;line-height:1.4;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-0.2px}
.card-summary{font-size:13px;color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.card-source{font-size:11px;font-weight:600;color:var(--text-muted)}
.card-time{font-size:11px;color:var(--text-muted)}
.card-read{font-size:11px;font-weight:600;color:var(--accent-blue);opacity:0;transition:var(--transition)}
.news-card:hover .card-read{opacity:1}
.news-card.featured{grid-column:1/-1;flex-direction:row;border:1px solid rgba(26,108,246,0.3);background:linear-gradient(135deg,var(--bg-card) 0%,rgba(26,108,246,0.05) 100%)}
.news-card.featured .card-accent{width:4px;height:auto;min-height:100%}
.news-card.featured .card-title{font-size:19px;-webkit-line-clamp:2}
.news-card.featured .card-summary{-webkit-line-clamp:3}
.featured-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent-gold);text-transform:uppercase;margin-bottom:4px}

/* === RIGHT PANEL === */
.right-panel{position:sticky;top:108px;display:flex;flex-direction:column;gap:12px}
.brief-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px}
.brief-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brief-title{font-size:13px;font-weight:700;color:var(--text-primary)}
.copy-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;background:rgba(26,108,246,0.12);border:1px solid rgba(26,108,246,0.25);color:var(--accent-blue);cursor:pointer;transition:var(--transition);font-family:var(--font-body)}
.copy-btn:hover{background:rgba(26,108,246,0.25)}
.copy-btn.copied{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:var(--accent-green)}
.brief-content{font-size:12.5px;color:var(--text-secondary);line-height:1.65}
.brief-placeholder{color:var(--text-muted);font-style:italic;font-size:12px}
.brief-section{margin-bottom:14px}
.brief-section:last-child{margin-bottom:0}
.brief-section-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.brief-bullet{display:flex;gap:8px;margin-bottom:5px;font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.brief-bullet::before{content:'•';color:var(--accent-teal);flex-shrink:0;margin-top:1px}
.trending-list{display:flex;flex-direction:column;gap:8px}
.trending-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.trending-item:last-child{border-bottom:none;padding-bottom:0}
.trending-num{font-size:18px;font-weight:800;color:var(--border-light);line-height:1;flex-shrink:0;min-width:22px}
.trending-text{font-size:12px;font-weight:600;color:var(--text-secondary);line-height:1.4}
.coverage-map{display:flex;flex-direction:column;gap:10px}
.coverage-row{display:flex;align-items:center;gap:10px}
.coverage-label{font-size:11px;font-weight:600;color:var(--text-secondary);width:80px;flex-shrink:0}
.coverage-bar-bg{flex:1;height:6px;background:var(--bg-surface);border-radius:99px;overflow:hidden}
.coverage-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.coverage-pct{font-size:11px;font-weight:700;color:var(--text-muted);width:28px;text-align:right}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:999;display:none;align-items:center;justify-content:center;padding:24px;animation:fade-in 0.2s ease}
.modal-overlay.open{display:flex}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:32px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;animation:slide-up 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 30px 80px rgba(0,0,0,0.6)}
@keyframes slide-up{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-category{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent-teal)}
.modal-source,.modal-date{font-size:12px;color:var(--text-muted)}
.modal-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.modal-close:hover{background:rgba(239,68,68,0.15);color:var(--accent-red)}
.modal-title{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.35;color:var(--text-primary);margin-bottom:16px}
.modal-summary{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:24px}
.modal-actions{display:flex;gap:10px;margin-bottom:20px}
.modal-btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);text-decoration:none;display:inline-flex;align-items:center;font-family:var(--font-body);border:none}
.modal-btn.primary{background:var(--accent-blue);color:white}
.modal-btn.primary:hover{background:#2563eb;transform:translateY(-1px)}
.modal-btn.secondary{background:rgba(255,255,255,0.06);border:1px solid var(--border-light);color:var(--text-secondary)}
.modal-btn.secondary:hover{background:rgba(255,255,255,0.1);color:var(--text-primary)}

/* ==========================================
   ARABIC STUDIO STYLES
   ========================================== */
.arabic-studio-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(10,191,188,0.1));border:1px solid rgba(168,85,247,0.4);border-radius:var(--radius-sm);color:#d8b4fe;font-size:13px;font-weight:700;cursor:pointer;transition:var(--transition)}.arabic-studio-btn:hover{background:linear-gradient(135deg,rgba(168,85,247,0.25),rgba(10,191,188,0.15));border-color:rgba(168,85,247,0.7);transform:translateY(-1px)}
.modal-btn.arabic{background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(10,191,188,0.1));border:1px solid rgba(168,85,247,0.35);color:#d8b4fe}.modal-btn.arabic:hover{background:rgba(168,85,247,0.25);transform:translateY(-1px)}
.modal-arabic-result{margin-top:16px;background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.2);border-radius:var(--radius-md);padding:16px}.arabic-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:12px;font-weight:700;color:#d8b4fe}.arabic-result-text{font-size:15px;line-height:1.9;color:var(--text-primary);font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.studio-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;align-items:stretch;justify-content:center}.studio-overlay.open{display:flex}.studio-panel{position:relative;width:100%;max-width:1300px;margin:20px;background:var(--bg-surface);border:1px solid rgba(168,85,247,0.2);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden}.studio-header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(168,85,247,0.07),rgba(10,191,188,0.04))}.studio-body{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;overflow:hidden}.studio-input-col{padding:24px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:14px;overflow-y:auto}.studio-textarea{flex:1;min-height:220px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;color:var(--text-primary);font-size:14px;line-height:1.65;resize:none}.studio-output-col{padding:24px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;background:rgba(168,85,247,0.02)}
.engine-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);display:inline-block}.engine-dot.gemini{background:var(--accent-green);box-shadow:0 0 8px var(--accent-green)}.engine-dot.fallback{background:var(--accent-gold)}
    </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#1a6cf6" stroke-width="2" />
          <path d="M12 20L20 12L28 20L20 28L12 20Z" fill="#1a6cf6" fill-opacity="0.3" stroke="#1a6cf6" stroke-width="2"/>
          <circle cx="20" cy="20" r="4" fill="#0abfbc"/>
        </svg>
      </div>
      <div>
        <span class="brand-name">خنساء Editorial Intelligence</span>
        <span class="brand-tagline">Advanced Media Radar</span>
      </div>
    </div>
    
    <div class="header-right">
      <div id="lastUpdated" class="last-updated">Connecting feeds...</div>
      <button id="openStudioBtn" class="arabic-studio-btn">
